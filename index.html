<!DOCTYPE html>

<title>CVC Words Spinner</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .spinner {
    perspective: 1200px;
    width: 400px; /* Increased size */
    height: 400px;
    position: relative;
    margin-bottom: 20px; /* Space for button */
  }

  .wheel {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(0deg);
    transition: transform 1s ease-in-out;
  }

  .slot {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
    background-color: #fff;
    border: 1px solid #333;
    transform-origin: center;
    backface-visibility: hidden;
  }

  button {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
