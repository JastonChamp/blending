<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sight Word Decoding Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- Sight Word Display -->
    <div id="sightWordDisplay" title="Tap to hear the word"></div>
    
    <!-- Sentence Display -->
    <div id="sentenceDisplay"></div>
    
    <!-- Reward Icon (star animation) -->
    <div id="reward">⭐</div>
    
    <!-- Navigation Controls -->
    <div id="controls">
      <button id="backBtn">Back</button>
      <button id="starBtn">Star</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
